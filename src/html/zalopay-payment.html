<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán ZaloPay - Ngõ Nhỏ Premium</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#6366f1",
                        secondary: "#8b5cf6",
                        zalopay: "#0068FF",
                        "zalopay-light": "#3385FF"
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'glow': 'glow 2s ease-in-out infinite'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        glow: {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(0, 104, 255, 0.3)' },
                            '50%': { boxShadow: '0 0 40px rgba(0, 104, 255, 0.6)' }
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }
        .zalopay-glow {
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, #0068FF, #3385FF, #0068FF);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }
        .floating-icon {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Background Decorations -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-20 w-32 h-32 bg-zalopay/20 rounded-full blur-3xl floating-icon" style="animation-delay: 0s;"></div>
        <div class="absolute bottom-40 right-20 w-48 h-48 bg-primary/20 rounded-full blur-3xl floating-icon" style="animation-delay: 1s;"></div>
        <div class="absolute top-1/2 left-1/3 w-24 h-24 bg-secondary/20 rounded-full blur-2xl floating-icon" style="animation-delay: 2s;"></div>
    </div>

    <div class="relative z-10 w-full max-w-md">
        <!-- Back Button -->
        <a href="futureme.html" class="inline-flex items-center text-white/70 hover:text-white mb-6 transition-colors group">
            <i class="ri-arrow-left-line text-xl mr-2 group-hover:-translate-x-1 transition-transform"></i>
            <span>Quay lại</span>
        </a>

        <!-- Main Card -->
        <div class="glass-card p-8 animate-slide-up">
            <!-- Logo & Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-zalopay to-zalopay-light rounded-2xl mb-4 shadow-lg zalopay-glow">
                    <i class="ri-bank-card-line text-4xl text-white"></i>
                </div>
                <h1 class="text-3xl font-['Pacifico'] text-white mb-2">Ngõ Nhỏ</h1>
                <p class="text-white/60 text-sm">Thanh toán Premium</p>
            </div>

            <!-- Amount Display -->
            <div class="bg-white/10 rounded-2xl p-6 mb-6 text-center">
                <p class="text-white/60 text-sm mb-2">Số tiền thanh toán</p>
                <div class="text-4xl font-bold text-white mb-2">199.000đ</div>
                <p class="text-zalopay-light text-sm">Gói Premium 1 tháng</p>
            </div>

            <!-- QR Code Placeholder -->
            <div class="bg-white rounded-2xl p-6 mb-6 text-center">
                <div class="w-48 h-48 mx-auto bg-gradient-to-br from-gray-100 to-gray-200 rounded-xl flex items-center justify-center mb-4 relative overflow-hidden">
                    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+CjxyZWN0IHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgZmlsbD0iI2YwZjBmMCIvPgo8cmVjdCB3aWR0aD0iMiIgaGVpZ2h0PSIyIiBmaWxsPSIjMDA2OEZGIi8+CjxyZWN0IHg9IjQiIHk9IjQiIHdpZHRoPSIyIiBoZWlnaHQ9IjIiIGZpbGw9IiMzMzg1RkYiLz4KPHJlY3QgeD0iOCIgeT0iOCIgd2lkdGg9IjIiIGhlaWdodD0iMiIgZmlsbD0iIzAwNjhGRiIvPgo8cmVjdCB4PSIxMiIgeT0iMTIiIHdpZHRoPSIyIiBoZWlnaHQ9IjIiIGZpbGw9IiMzMzg1RkYiLz4KPC9zdmc+')] opacity-50"></div>
                    <i class="ri-qr-code-line text-6xl text-gray-400"></i>
                </div>
                <p class="text-gray-600 text-sm font-medium">Quét mã QR với ZaloPay</p>
            </div>

            <!-- Payment Button -->
            <button class="w-full py-4 px-6 bg-gradient-to-r from-zalopay to-zalopay-light text-white font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:scale-[1.02] transition-all duration-300 flex items-center justify-center space-x-3">
                <i class="ri-bank-card-fill text-2xl"></i>
                <span class="text-lg">Mở ZaloPay</span>
            </button>

            <!-- Alternative -->
            <div class="mt-6 text-center">
                <p class="text-white/50 text-sm">Hoặc</p>
                <button class="mt-3 text-white/80 hover:text-white text-sm font-medium underline underline-offset-4 transition-colors">
                    Thanh toán bằng thẻ ATM/Visa
                </button>
            </div>

            <!-- Security Badge -->
            <div class="mt-8 flex items-center justify-center space-x-2 text-white/50">
                <i class="ri-shield-check-line"></i>
                <span class="text-xs">Bảo mật thanh toán</span>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-white/30 text-xs mt-6">
            © 2025 Ngõ Nhỏ · Thanh toán an toàn
        </p>
    </div>
</body>
</html>
